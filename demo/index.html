<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>leaflet.us-states — Simple Example</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="../src/leaflet.us-states.css" />
  <style>
    html, body, #map { height: 100%; margin: 0; }
    #panel {
      position: absolute;
      top: 10px;
      left: 50px;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      font-family: Arial, sans-serif;
      font-size: 13px;
      max-width: 420px;
    }
    button { margin-top: 8px; }
    code { font-size: 12px; }
  </style>
</head>
<body>
  <div id="panel">
    <div><strong>Simple Example</strong></div>
    <div>Highlight a state via direct property access:<br/><code>states["KY"].color = "red"</code></div>
    <button id="apply">Highlight Kentucky</button>
    <button id="reset" style="margin-left:6px">Reset</button>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../../leaflet.regions/src/leaflet.regions.js"></script>
  <script src="../src/leaflet.us-states.js"></script>
  <script>
    var usViewBounds = L.latLngBounds([
      [15, -170],
      [72, -52]
    ]);

    var map = L.map('map', {
      maxBounds: usViewBounds,
      maxBoundsViscosity: 1.0
    }).setView([39.5, -98.35], 4);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    var layer = L.usStatesLayer({
      geoJsonUrl: '../src/us-states-detailed.geojson',
      color: '#3498db',
      popupAction: 'click',
      popupContent: function (feature) {
        return '<b>' + (feature.properties.name || 'State') + '</b>';
      }
    }).addTo(map);

    var states = layer.getStates();

    document.getElementById('apply').addEventListener('click', function () {
      states['KY'] = states['KY'] || {};
      states['KY'].color = 'red';
      states['KY'].label = 'KY';
      states['KY'].popupContent = '<b>Kentucky</b><br/>Highlighted via <code>states["KY"].color = "red"</code>';
      layer.refresh();
    });

    document.getElementById('reset').addEventListener('click', function () {
      delete states['KY'];
      layer.refresh();
    });
  </script>
</body>
</html>
