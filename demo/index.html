<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>leaflet.us-states — Simple Usage</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="../src/leaflet.us-states.css" />
  <style>
    html, body, #map { height: 100%; margin: 0; }
    #panel {
      position: absolute;
      top: 10px;
      left: 50px;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 12px 14px;
      font-family: Segoe UI, Arial, sans-serif;
      font-size: 13px;
      max-width: 280px;
    }
    #panel code {
      display: block;
      background: #f3f4f6;
      border-radius: 4px;
      padding: 6px 8px;
      margin-top: 8px;
      font-size: 12px;
      white-space: pre;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../vendor/leaflet.regions.js"></script>
  <script src="../src/leaflet.us-states.js"></script>
  <script>
    var map = L.map('map').setView([35, -98], 5);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    L.usStatesLayer({
      geoJsonUrl: '../src/us-states.geojson',
      defaultVisible: false,
      data: {
        states: {
          KS: { name: 'Kansas',   color: '#3b82f6' },
          OK: { name: 'Oklahoma', color: '#22c55e' },
          TX: { name: 'Texas',    color: '#ef4444', popupContent: '<b>Texas</b><br/>The Lone Star State'}
        }
      }
    }).addTo(map);
  </script>
</body>
</html>
