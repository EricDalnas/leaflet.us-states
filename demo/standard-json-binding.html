<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standard Usage Binding Demo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="../src/leaflet.us-states.css" />
  <style>
    html, body, #map { height: 100%; margin: 0; }
    #panel {
      position: absolute;
      top: 10px;
      left: 50px;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      font-family: Arial, sans-serif;
      font-size: 13px;
      max-width: 420px;
    }
    code { font-size: 12px; }
  </style>
</head>
<body>
  <div id="panel">
    <div><strong>Standard Usage Binding Demo</strong></div>
    <div>Loads:</div>
    <code>demo/data/state-usage.standard.json</code>
    <div style="margin-top:6px;">Format: { format, version, states: { FL: { ... }, GA: { ... } } }</div>
    <div id="statusMsg" style="margin-top:8px; color:#334155;">Loading data…</div>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../../leaflet.regions/src/leaflet.regions.js"></script>
  <script src="../src/leaflet.us-states.js"></script>
  <script>
    var usViewBounds = L.latLngBounds([
      [15, -170],
      [72, -52]
    ]);

    var map = L.map('map', {
      maxBounds: usViewBounds,
      maxBoundsViscosity: 1.0
    }).setView([39.5, -98.35], 4);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    var statusMsgEl = document.getElementById('statusMsg');

    function validateStatesPayload(payload) {
      if (!payload || typeof payload !== 'object' || Array.isArray(payload)) {
        throw new Error('Expected an object payload.');
      }
      if (!payload.states || typeof payload.states !== 'object' || Array.isArray(payload.states)) {
        throw new Error('Expected payload.states to be an object map like { states: { FL: {...} } }.');
      }
      return payload;
    }

    var layer = L.usStatesLayer({
      geoJsonUrl: '../src/us-states-detailed.geojson',
      color: '#95a5a6',
      labelColor: '#222',
      popupAction: 'click',
      popupContent: function (feature, sd) {
        var stateName = feature.properties.name || 'State';
        if (sd && sd.stateFacts) {
          return '<b>' + stateName + '</b><br>' +
                 'Capital: ' + (sd.stateFacts.capital || 'N/A') + '<br>' +
                 'Nickname: ' + (sd.stateFacts.nickname || 'N/A') + '<br>' +
                 'Population: ' + (sd.stateFacts.population || 'N/A');
        }
        return '<b>' + stateName + '</b><br>No standard usage data in JSON';
      }
    }).addTo(map);

    fetch('./data/state-usage.standard.json')
      .then(function (response) {
        if (!response.ok) throw new Error('Failed to load JSON: HTTP ' + response.status);
        return response.json();
      })
      .then(function (payload) {
        layer.setData(validateStatesPayload(payload));
        statusMsgEl.textContent = 'Loaded standard data successfully.';
      })
      .catch(function (err) {
        statusMsgEl.textContent = 'Data error: ' + err.message;
        statusMsgEl.style.color = '#b91c1c';
      });
  </script>
</body>
</html>
